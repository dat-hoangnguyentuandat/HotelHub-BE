spring.application.name=backend
server.port=8081

# MySQL - XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/hotelhub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Chạy data.sql sau khi Hibernate tạo bảng xong
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=HotelHub2026SuperSecretKeyForJWTGenerationMustBe256BitsLong!
app.jwt.expiration-ms=86400000
