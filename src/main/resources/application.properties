spring.application.name=backend
server.port=8081

# MySQL - XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/hotelhub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Chạy data.sql sau khi Hibernate tạo bảng xong
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=HotelHub2026SuperSecretKeyForJWTGenerationMustBe256BitsLong!
app.jwt.expiration-ms=86400000

# ── File Upload ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=uploads

# ── Debug logging ──
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ─────────────────────────────────────────────────
# PAYMENT CONFIGURATION
# ─────────────────────────────────────────────────
# Thời gian phiên thanh toán (phút)
app.payment.session-timeout-minutes=15
# VAT mặc định 10%
app.payment.vat-rate=0.10
# Tỉ lệ tích điểm: 1 điểm / 1000 VND
app.payment.points-per-1000vnd=1
# Giá trị 1 điểm: 100 VND
app.payment.vnd-per-point=100

# ─── Mô phỏng Gateway ─────────────────────────────
# Tỉ lệ thành công của gateway mô phỏng (0.0 – 1.0)
app.payment.gateway.simulate-success-rate=0.95

# ─── Spring Scheduling (cần cho expireStalePayments) ─
spring.task.scheduling.pool.size=2

# ─────────────────────────────────────────────────
# GOOGLE OAUTH2 CONFIGURATION
